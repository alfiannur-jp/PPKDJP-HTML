  <style>

    .card-table {
      background-color: white;

      background-color: black;
      color: white;
      text-align: center;
    }

      padding: 12px 15px;
    }

    }

      color: white;
      text-decoration: none;
      border-radius: 5px;
      font-weight: bold;
      font-size: 14px;
      transition: background 0.3s;
    }

    .btn-tambah:hover {
      background-color: #53CBF3;
    }

    .table tbody tr td {
      text-align: center;
    }
  </style>
</head>
