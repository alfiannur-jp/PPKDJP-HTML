<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contacts</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="assets/css/pian.css">

  <link href="https://fonts.googleapis.com" rel="preconnect" />
  <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet" />

  <!-- Feather Icons  -->
  <script src="https://unpkg.com/feather-icons"></script>
  <!-- Feather Icons -->
</head>

<body>

  <!-- Start Navbar -->
  <div class="wrapper">
    <nav class="navbar navbar-expand-lg navbar-custom fixed-top py-3">
      <div class="container">
        <a class="navbar-brand text-primary" href="#">Dev_Portofolio <i data-feather="github"></i> </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent"
          aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <ul class="navbar-nav mx-auto mb-2 mb-lg-0 gap-lg-3">
            <li class="nav-item">
              <a class="nav-link-custom px-2" aria-current="page" href="#">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link-custom px-2" href="#">Experience</a>
            </li>
            <li class="nav-item">
              <a class="nav-link-custom px-2" href="#">Projects</a>
            </li>
            <li class="nav-item">
              <a class="nav-link-custom px-2" href="#">Skills</a>
            </li>
            <li class="nav-item">
              <a class="nav-link-custom px-2 active" href="#">Contacts</a>
            </li>
          </ul>

          <!-- Feather Icons -->
          <i data-feather="terminal" class="card mx-lg-1 fs-3"></i>
          <i data-feather="code" class="mx-lg-3 fs-3"></i>
          <!-- End Feather Icons -->

          <div class="d-flex">
            <button class="btn btn-primary fw-medium">Download CV</button>
          </div>
        </div>
      </div>
    </nav>
  </div>
  <!-- End Navbar -->

  <main class="pt-5" style="padding-top: 100px;">
    <section class="container py-5">
      <div class="row">
        <div class="col-lg-8">
          <span class="text-primary fw-bolder text-uppercase d-block mt-4"
            style="font-size: 14px; letter-spacing: 3px;">
            system.init_communication()
          </span>
          <h1 class="display-4 fw-bold mb-4">
            Get in touch
          </h1>
          <p class="text-secondary mb-5 fs-5">
            Whether you have a specific project in mind, a technical question, or just want to talk shop about system
            architecture, my inbox is always open.
          </p>
        </div>
      </div>

      <div class="row">
        <div class="col-lg-8 col-12">
          <div class="project-card">
            <form class="row g-3">
              <div class="col-md-6 text-uppercase">
                <label for="exampleFormControlInput1" class="form-label">Name</label>
                <input type="name" class="form-control" id="exampleFormControlInput1" placeholder="Jhon Doe">
              </div>
              <div class="col-md-6 text-uppercase">
                <label for="exampleFormControlInput1" class="form-label">Email</label>
                <input type="email" class="form-control" id="exampleFormControlInput1" placeholder="name@example.com">
              </div>
              <div class="mb-3 text-uppercase">
                <label for="exampleFormControlTextarea1" class="form-label">Message</label>
                <textarea class="form-control" id="exampleFormControlTextarea1" rows="3"></textarea>
              </div>
            </form>
            <div class="d-flex gap-3 justify-content-md-end">
              <button class="btn btn-primary d-flex align-items-center gap-2">
                Send Message <i data-feather="send"></i>
              </button>
            </div>
          </div>
        </div>
        <div class="col-lg-4 col-12">
          <div class="project-card">
            <h1 class="fw-bold">Connect _</h1>
            <div class="d-grid gap-2">
              <button type="button" class="btn btn-light text-start">
                <i data-feather="linkedin"></i>
                LinkedIn
                <i data-feather="chevrons-right"></i>
              </button>
              <button type="button" class="btn btn-light text-start"><i data-feather="github"></i> GitHub <i
                  data-feather="chevrons-right"></i></button>
              <button type="button" class="btn btn-light text-start"><i data-feather="instagram"></i> Instagram <i
                  data-feather="chevrons-right"></i></button>
            </div>
          </div>
        </div>
    </section>
  </main>


  <!-- Feather Icons -->
  <script>
    feather.replace();
  </script>
  <!-- Feather Icons -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
